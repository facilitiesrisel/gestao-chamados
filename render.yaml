services:
  - type: web
    name: risel-facilities
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/db-status
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        fromService:
          name: risel-facilities
          type: web
          property: url
      - key: SMTP_USER
        value: facilitiesrisel@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: ai-studio-applet-webapp-3f137
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      # FIREBASE_DATABASE_ID e FIREBASE_FIRESTORE_DATABASE_ID removidos intencionalmente.
      # O valor real do banco nomeado é lido do firebase-applet-config.json no servidor.
      - key: JWT_SECRET
        generateValue: true
